<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WordPress Auto Claw</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }
    .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 2px solid #e0e0e0; }
    .header h1 { font-size: 1.8rem; color: #E53935; }
    .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-weight: 500; }
    .btn-primary { background: #E53935; color: white; }
    .btn-secondary { background: white; color: #333; border: 1px solid #ddd; }
    .btn-success { background: #4CAF50; color: white; }
    .btn-small { padding: 6px 12px; font-size: 0.8rem; }
    .sheet-info { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .status-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
    .status-item { background: white; padding: 20px; border-radius: 8px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .status-count { display: block; font-size: 2rem; font-weight: bold; color: #E53935; }
    .status-label { color: #666; font-size: 0.9rem; }
    .table-container { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 800px; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e0e0e0; font-size: 0.9rem; }
    th { background: #f5f5f5; font-weight: 600; color: #666; white-space: nowrap; }
    tr:hover { background: rgba(229, 57, 53, 0.05); }
    .status-badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 12px; font-size: 0.8rem; font-weight: 500; }
    .status-pending { background: #FFF3E0; color: #E65100; }
    .status-progress { background: #E3F2FD; color: #1565C0; }
    .status-complete { background: #E8F5E9; color: #2E7D32; }
    .loading { text-align: center; padding: 60px; }
    .spinner { width: 40px; height: 40px; border: 3px solid #e0e0e0; border-top-color: #E53935; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { text-align: center; padding: 40px; color: #C62828; }
    .hidden { display: none !important; }
    .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 2000; }
    .toast { padding: 15px 20px; border-radius: 8px; color: white; margin-bottom: 10px; }
    .toast-success { background: #4CAF50; }
    .toast-error { background: #f44336; }
    .col-topic { min-width: 250px; max-width: 400px; }
    .col-status { min-width: 120px; }
    .col-action { min-width: 100px; white-space: nowrap; }
    td { vertical-align: middle; }
    .truncate { max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>🦞 WordPress Auto Claw</h1>
      <button id="refreshBtn" class="btn btn-secondary">↻ Refresh</button>
    </header>

    <div class="sheet-info">
      <span id="sheetName">📊 Loading...</span>
      <span id="lastUpdated">Never updated</span>
    </div>

    <div class="status-bar">
      <div class="status-item">
        <span class="status-count" id="pendingCount">0</span>
        <span class="status-label">Pending</span>
      </div>
      <div class="status-item">
        <span class="status-count" id="progressCount">0</span>
        <span class="status-label">In Progress</span>
      </div>
      <div class="status-item">
        <span class="status-count" id="completedCount">0</span>
        <span class="status-label">Completed</span>
      </div>
      <div class="status-item">
        <span class="status-count" id="totalCount">0</span>
        <span class="status-label">Total</span>
      </div>
    </div>

    <div id="loadingState" class="loading">
      <div class="spinner"></div>
      <p>Loading spreadsheet...</p>
    </div>

    <div id="errorState" class="error hidden">
      <p id="errorMessage">Error loading</p>
      <button id="retryBtn" class="btn btn-primary" style="margin-top: 10px;">Retry</button>
    </div>

    <div id="tableContainer" class="table-container hidden">
      <table id="dataTable">
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <script>
    class App {
      constructor() {
        this.data = [];
        this.headers = [];
        this.columns = {};
        this.init();
      }

      init() {
        document.getElementById('refreshBtn').addEventListener('click', () => this.loadData());
        document.getElementById('retryBtn').addEventListener('click', () => this.loadData());
        this.loadData();
      }

      async loadData() {
        this.showLoading(true);
        this.showError(false);

        try {
          const response = await fetch('/api/sheet');
          if (!response.ok) throw new Error('Failed to load');

          const result = await response.json();
          this.headers = result.headers;
          this.data = result.data;
          this.columns = result.columns;
          
          console.log('Columns detected:', this.columns);
          
          this.renderTable();
          this.updateStats();
          this.showLoading(false);
          this.updateTime();
        } catch (error) {
          console.error('Load error:', error);
          this.showLoading(false);
          this.showError(true, error.message);
        }
      }

      renderTable() {
        const thead = document.getElementById('tableHead');
        const tbody = document.getElementById('tableBody');
        
        // Render headers
        let headerHTML = '<tr>';
        this.headers.forEach(header => {
          headerHTML += `<th>${this.escapeHtml(header)}</th>`;
        });
        headerHTML += '</tr>';
        thead.innerHTML = headerHTML;

        // Render data rows
        if (this.data.length === 0) {
          tbody.innerHTML = `<tr><td colspan="${this.headers.length}" style="text-align:center;padding:40px;">No data found</td></tr>`;
          return;
        }

        tbody.innerHTML = this.data.map((row, index) => {
          let rowHTML = '<tr>';
          
          this.headers.forEach(header => {
            const value = row[header] || '';
            const lowerHeader = header.toLowerCase();
            
            // Special rendering for certain columns
            if (lowerHeader.includes('status')) {
              rowHTML += `<td class="col-status">${this.renderStatus(value)}</td>`;
            } else if (lowerHeader.includes('url') || lowerHeader.includes('link')) {
              if (value && value.startsWith('http')) {
                rowHTML += `<td><a href="${value}" target="_blank" title="${value}">🔗 Link</a></td>`;
              } else {
                rowHTML += `<td class="truncate" title="${this.escapeHtml(value)}">${this.escapeHtml(value)}</td>`;
              }
            } else if (lowerHeader.includes('keyword') || lowerHeader.includes('topic') || lowerHeader.includes('title')) {
              rowHTML += `<td class="col-topic"><strong>${this.escapeHtml(value)}</strong></td>`;
            } else {
              rowHTML += `<td class="truncate" title="${this.escapeHtml(value)}">${this.escapeHtml(value)}</td>`;
            }
          });
          
          rowHTML += '</tr>';
          return rowHTML;
        }).join('');
      }

      renderStatus(status) {
        const value = (status || '').toLowerCase();
        if (value.includes('complete') || value.includes('done') || value.includes('published')) {
          return '<span class="status-badge status-complete">✅ Completed</span>';
        } else if (value.includes('progress') || value.includes('pending') || value.includes('in')) {
          return '<span class="status-badge status-progress">🔄 In Progress</span>';
        } else {
          return '<span class="status-badge status-pending">⏳ Pending</span>';
        }
      }

      updateStats() {
        const total = this.data.length;
        let completed = 0;
        let inProgress = 0;
        let pending = 0;

        this.data.forEach(row => {
          const statusCol = this.columns.status;
          if (statusCol) {
            const status = (row[statusCol] || '').toLowerCase();
            if (status.includes('complete') || status.includes('done') || status.includes('published')) {
              completed++;
            } else if (status.includes('progress') || status.includes('in')) {
              inProgress++;
            } else {
              pending++;
            }
          } else {
            pending++;
          }
        });

        document.getElementById('pendingCount').textContent = pending;
        document.getElementById('progressCount').textContent = inProgress;
        document.getElementById('completedCount').textContent = completed;
        document.getElementById('totalCount').textContent = total;
      }

      showLoading(show) {
        document.getElementById('loadingState').classList.toggle('hidden', !show);
        document.getElementById('tableContainer').classList.toggle('hidden', show);
      }

      showError(show, message) {
        document.getElementById('errorState').classList.toggle('hidden', !show);
        if (show) document.getElementById('errorMessage').textContent = message;
      }

      updateTime() {
        document.getElementById('lastUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString();
        document.getElementById('sheetName').textContent = '📊 ' + (this.headers[0] || 'Spreadsheet');
      }

      escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }
    }

    const app = new App();
  </script>
</body>
</html>
